<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micrófono SingStar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #030305; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .glass { background: rgba(20, 20, 30, 0.45); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 32px; text-align: center; }
        .btn { background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: white; font-weight: 900; font-size: 1.5rem; padding: 16px 32px; border-radius: 9999px; border: none; outline: none; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4); text-transform: uppercase; letter-spacing: 2px; }
        .btn:active { transform: scale(0.95); }
        .status { margin-top: 16px; font-size: 1rem; color: #aaa; }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 242, 254, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(0, 242, 254, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 242, 254, 0); } }
        .connected { background: linear-gradient(135deg, #00b09b, #96c93d) !important; box-shadow: 0 4px 15px rgba(150, 201, 61, 0.4) !important; }
    </style>
</head>
<body>
    <div class="glass w-11/12 max-w-sm">
        <h1 class="text-3xl font-black mb-2 uppercase tracking-tight" style="background: linear-gradient(135deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🎤 SingStar Mic</h1>
        <p class="text-gray-400 mb-8 text-sm">Usa tu móvil como micrófono sin latencia.</p>
        
        <button id="connectBtn" class="btn w-full">Conectar</button>
        <div id="status" class="status">Esperando conexión...</div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <script>
        const connectBtn = document.getElementById('connectBtn');
        const statusEl = document.getElementById('status');
        let peer;
        let localStream;
        
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('target');

        if (!targetId) {
            statusEl.innerText = "Error: Código de PC no encontrado en el enlace.";
            statusEl.style.color = "#ff0844";
            connectBtn.style.display = 'none';
        }

        connectBtn.addEventListener('click', async () => {
            if (localStream) return;

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, autoGainControl: false, noiseSuppression: false, latency: 0 }, 
                    video: false 
                });
                
                statusEl.innerText = "Conectando con el PC por PeerJS...";
                
                peer = new Peer();
                
                peer.on('open', (id) => {
                    const call = peer.call(targetId, localStream);
                    
                    call.on('stream', () => {
                        // El PC ha respondido
                    });
                    
                    statusEl.innerText = "¡Conectado! Ya puedes cantar.";
                    statusEl.style.color = "#96c93d";
                    connectBtn.innerText = "🎤 EN VIVO";
                    connectBtn.classList.add('pulse', 'connected');
                });

                peer.on('error', (err) => {
                    console.error("PeerJS Error (Mobile):", err.type);
                    if (err.type === 'peer-unavailable') {
                        statusEl.innerText = "Error: El PC no está disponible. Escanea de nuevo el código QR.";
                    } else if (err.type === 'network') {
                        statusEl.innerText = "Error de red. Verifica tu conexión.";
                    } else {
                        statusEl.innerText = "Error: " + err.type;
                    }
                    statusEl.style.color = "#ff0844";
                    connectBtn.classList.remove('pulse', 'connected');
                    connectBtn.innerText = "Reconectar";
                });
            } catch (err) {
                statusEl.innerText = "Error de micrófono: " + err.message;
                statusEl.style.color = "#ff0844";
            }
        });
    </script>
</body>
</html>
